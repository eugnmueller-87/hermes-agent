name: Hermes CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: Check code quality (errors + warnings)
        run: ruff check . --exclude .venv
      - name: Check code formatting
        run: ruff format --check . --exclude .venv

  health:
    name: Health Check
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Wait for Railway deploy
        run: sleep 30
      - name: Ping Hermes
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://hermes-agent-production-114e.up.railway.app/health \
            --max-time 15)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Hermes is not healthy (HTTP $STATUS)"
            exit 1
          fi
          echo "Hermes is up"
